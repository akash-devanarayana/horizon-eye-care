<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14283a"/>
      <stop offset="1" stop-color="#0b1620"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f1dd86"/>
      <stop offset="1" stop-color="#d9c25a"/>
    </linearGradient>
    <clipPath id="aboveHorizon"><rect x="0" y="0" width="512" height="300"/></clipPath>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <g clip-path="url(#aboveHorizon)">
    <circle cx="256" cy="300" r="130" fill="url(#sun)"/>
    <g stroke="#d9c25a" stroke-width="14" stroke-linecap="round" opacity="0.9">
      <line x1="256" y1="70" x2="256" y2="40"/>
      <line x1="130" y1="120" x2="110" y2="100"/>
      <line x1="382" y1="120" x2="402" y2="100"/>
    </g>
  </g>

  <line x1="96" y1="300" x2="416" y2="300" stroke="#e8e2d4" stroke-width="22" stroke-linecap="round"/>
  <line x1="170" y1="356" x2="342" y2="356" stroke="#e8e2d4" stroke-width="16" stroke-linecap="round" opacity="0.4"/>
</svg>
