name: Tauri build (spike)

# De-risks the Tauri toolchain by compiling + bundling on a Windows runner.
# (Local builds are blocked by Smart App Control on the dev machine.)

on:
  push:
    branches: [feature/tauri-spike]
    paths:
      - 'tauri/**'
      - '.github/workflows/tauri-spike.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: tauri
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri

      - name: Install frontend deps
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: horizon-tauri-spike
          if-no-files-found: error
          path: |
            tauri/src-tauri/target/release/bundle/nsis/*.exe
            tauri/src-tauri/target/release/bundle/msi/*.msi
