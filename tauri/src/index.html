<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horizon (spike)</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f2027;
      color: #e8f1f7;
      margin: 0;
      padding: 28px;
    }
    h1 { font-size: 20px; font-weight: 600; margin: 0 0 6px; }
    p { color: #8aa0ad; font-size: 13px; margin: 0 0 18px; }
    .row { margin: 10px 0; font-size: 14px; }
    code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px; }
    button {
      background: #2c5364; color: #fff; border: none; border-radius: 6px;
      padding: 9px 16px; font-size: 13px; cursor: pointer; margin-right: 8px;
    }
    button:hover { background: #3a7b8e; }
  </style>
</head>
<body>
  <h1>Horizon — Tauri spike</h1>
  <p>Proving tray, transparent fullscreen overlay, and the Win32 fullscreen call.</p>

  <div class="row">Notification state: <code id="state">…</code></div>
  <div class="row">Fullscreen app active: <code id="fs">…</code></div>

  <div class="row">
    <button id="refresh">Refresh state</button>
    <button id="overlay">Toggle overlay</button>
  </div>

  <script type="module">
    const { invoke } = window.__TAURI__.core;

    async function refresh() {
      const state = await invoke('notification_state');
      const fs = await invoke('is_fullscreen_app');
      document.getElementById('state').textContent = state;
      document.getElementById('fs').textContent = fs;
    }

    document.getElementById('refresh').addEventListener('click', refresh);
    document.getElementById('overlay').addEventListener('click', () => invoke('toggle_overlay'));
    refresh();
  </script>
</body>
</html>
