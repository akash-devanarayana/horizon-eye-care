<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horizon Break (spike)</title>
  <style>
    html, body { margin: 0; height: 100%; }
    body {
      /* semi-transparent so we can confirm window transparency works */
      background: rgba(15, 32, 39, 0.85);
      color: #e8f1f7;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    .emoji { font-size: 72px; margin-bottom: 18px; }
    .msg { font-size: 42px; font-weight: 300; letter-spacing: 2px; }
    .hint { position: absolute; bottom: 48px; opacity: 0.45; font-size: 15px; }
  </style>
</head>
<body>
  <div class="emoji">🌅</div>
  <div class="msg">Look at the horizon</div>
  <div class="hint">transparent fullscreen overlay — spike</div>
</body>
</html>
