<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Horizon Update</title>
<link rel="stylesheet" href="fonts.css">
<style>
  :root {
    --paper: #f4f0e8;
    --ink: #0a0a0a;
    --muted: #8a857c;
    --gold: #d9c25a;
    --gold-deep: #c4ab3f;
    --line: rgba(10, 10, 10, 0.14);
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
    --sans: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: transparent; }
  body { font-family: var(--sans); padding: 16px; -webkit-font-smoothing: antialiased; }

  .toast {
    position: relative;
    height: 100%;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    box-shadow: 0 14px 34px rgba(0, 0, 0, 0.28);
    overflow: hidden;
    padding: 15px 17px;
    display: flex;
    flex-direction: column;
    animation: slidein 0.4s var(--ease) both;
  }
  @keyframes slidein {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: none; }
  }
  .toast::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--gold);
  }

  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    -webkit-app-region: drag;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold-deep); }
  .close {
    -webkit-app-region: no-drag;
    width: 22px; height: 22px;
    border: none;
    background: transparent;
    color: var(--muted);
    border-radius: 5px;
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: all 0.15s var(--ease);
  }
  .close:hover { background: rgba(10, 10, 10, 0.06); color: var(--ink); }

  .msg {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin: 10px 0 14px;
  }
  .msg b { color: var(--gold-deep); }

  .actions {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: auto;
    -webkit-app-region: no-drag;
  }
  .download {
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 7px;
    padding: 9px 20px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.15s var(--ease);
  }
  .download:hover { background: var(--gold-deep); color: var(--ink); }
  .later {
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .later:hover { color: var(--ink); }
</style>
</head>
<body>
  <div class="toast">
    <div class="top">
      <div class="brand"><span class="dot"></span> Horizon</div>
      <button class="close" id="closeBtn" aria-label="Dismiss">&times;</button>
    </div>
    <div class="msg">Version <b id="ver">—</b> is available</div>
    <div class="actions">
      <button class="download" id="dl">Download</button>
      <button class="later" id="later">Later</button>
    </div>
  </div>
  <script>
    window.horizon.getUpdateInfo().then(info => {
      if (info && info.version) document.getElementById('ver').textContent = info.version;
    });
    document.getElementById('dl').addEventListener('click', () => window.horizon.downloadUpdate());
    document.getElementById('closeBtn').addEventListener('click', () => window.horizon.dismissUpdate());
    document.getElementById('later').addEventListener('click', () => window.horizon.dismissUpdate());
  </script>
</body>
</html>
