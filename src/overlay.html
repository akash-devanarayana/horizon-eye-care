<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizon Break</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
      cursor: default;
      overflow: hidden;
      transition: background 1s ease;
    }

    /* Per-mode backgrounds */
    body.mode-stars { background: linear-gradient(180deg, #05060f, #0d1b2a 60%, #1b263b); }
    body.mode-rain { background: linear-gradient(180deg, #1a2027, #243240 70%, #2c3e50); }
    body.mode-breathing { background: linear-gradient(135deg, #0b132b, #1c2541 60%, #3a506b); }

    /* Foreground content sits above background layers */
    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .emoji {
      font-size: 72px;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .message {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: 2px;
      margin-bottom: 48px;
    }

    /* Circular progress timer */
    .timer-ring {
      position: relative;
      width: 240px;
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .timer-ring svg {
      position: absolute;
      inset: 0;
      transform: rotate(-90deg);
    }

    .ring-track {
      fill: none;
      stroke: rgba(255, 255, 255, 0.12);
      stroke-width: 6;
    }

    .ring-progress {
      fill: none;
      stroke: rgba(255, 255, 255, 0.85);
      stroke-width: 6;
      stroke-linecap: round;
    }

    .countdown {
      font-size: 80px;
      font-weight: 200;
      font-variant-numeric: tabular-nums;
      opacity: 0.9;
    }

    .skip {
      margin-top: 48px;
      padding: 10px 28px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      background: transparent;
      color: rgba(255, 255, 255, 0.5);
      font-size: 16px;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    .skip:hover {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
      border-color: rgba(255, 255, 255, 0.5);
    }

    .hint {
      position: absolute;
      bottom: 48px;
      font-size: 16px;
      opacity: 0.4;
      letter-spacing: 1px;
      z-index: 2;
    }

    /* Background animation layers */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    /* Stars */
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--dur) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.1; }
      to { opacity: var(--max); }
    }

    /* Rain */
    .drop {
      position: absolute;
      top: -120px;
      width: 2px;
      height: 90px;
      background: linear-gradient(transparent, rgba(174, 198, 255, 0.45));
      animation: fall var(--dur) linear infinite;
    }
    @keyframes fall {
      from { transform: translateY(-120px); }
      to { transform: translateY(110vh); }
    }

    /* Breathing circle */
    .breathing-circle {
      position: fixed;
      z-index: 1;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(95,180,216,0.35), rgba(95,180,216,0.05) 70%, transparent);
      border: 1px solid rgba(95, 180, 216, 0.3);
      animation: breathe 8s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(0.7); opacity: 0.5; }
      50% { transform: scale(1.5); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="bg-layer" id="stars"></div>
  <div class="bg-layer" id="rain"></div>
  <div class="breathing-circle" id="breathingCircle" style="display:none;"></div>

  <div class="content">
    <div class="emoji" id="emoji">🌅</div>
    <div class="message">Look at the horizon</div>
    <div class="timer-ring">
      <svg viewBox="0 0 240 240">
        <circle class="ring-track" cx="120" cy="120" r="110"></circle>
        <circle class="ring-progress" id="ringProgress" cx="120" cy="120" r="110"></circle>
      </svg>
      <div class="countdown" id="countdown">20</div>
    </div>
    <button class="skip" onclick="window.horizon.skipBreak()">Skip</button>
  </div>
  <div class="hint" id="hint">Rest your eyes — focus on something far away</div>

  <script>
    const MODES = {
      sunrise: {
        emoji: '🌅',
        hint: 'Rest your eyes — focus on something far away',
      },
      stars: {
        emoji: '🌙',
        hint: 'Let your eyes wander across the stars',
      },
      rain: {
        emoji: '🌧️',
        hint: 'Breathe slowly with the rain',
      },
      breathing: {
        emoji: '',
        hint: 'Breathe in as it grows, out as it shrinks',
      },
    };

    function buildStars() {
      const container = document.getElementById('stars');
      const count = 70;
      let html = '';
      for (let i = 0; i < count; i++) {
        const size = (Math.random() * 2 + 1).toFixed(1);
        const left = (Math.random() * 100).toFixed(2);
        const top = (Math.random() * 100).toFixed(2);
        const dur = (Math.random() * 2.5 + 1.5).toFixed(2);
        const max = (Math.random() * 0.5 + 0.5).toFixed(2);
        html += `<div class="star" style="width:${size}px;height:${size}px;left:${left}%;top:${top}%;--dur:${dur}s;--max:${max}"></div>`;
      }
      container.innerHTML = html;
    }

    function buildRain() {
      const container = document.getElementById('rain');
      const count = 60;
      let html = '';
      for (let i = 0; i < count; i++) {
        const left = (Math.random() * 100).toFixed(2);
        const dur = (Math.random() * 0.6 + 0.6).toFixed(2);
        const delay = (Math.random() * 2).toFixed(2);
        const opacity = (Math.random() * 0.5 + 0.3).toFixed(2);
        html += `<div class="drop" style="left:${left}%;--dur:${dur}s;animation-delay:-${delay}s;opacity:${opacity}"></div>`;
      }
      container.innerHTML = html;
    }

    function applyMode(mode) {
      const cfg = MODES[mode];
      document.body.classList.add('mode-' + mode);

      const emojiEl = document.getElementById('emoji');
      if (cfg.emoji) {
        emojiEl.textContent = cfg.emoji;
      } else {
        emojiEl.style.display = 'none';
      }
      document.getElementById('hint').textContent = cfg.hint;

      if (mode === 'stars') buildStars();
      if (mode === 'rain') buildRain();
      if (mode === 'breathing') {
        document.getElementById('breathingCircle').style.display = 'block';
      }
    }

    // Pick a random animation each break
    const modeKeys = Object.keys(MODES);
    const mode = modeKeys[Math.floor(Math.random() * modeKeys.length)];
    applyMode(mode);

    window.horizon.getSettings().then(settings => {
      const total = settings.breakSeconds;
      let remaining = total;
      const el = document.getElementById('countdown');
      el.textContent = remaining;

      // Set up the progress ring
      const ring = document.getElementById('ringProgress');
      const radius = ring.r.baseVal.value;
      const circumference = 2 * Math.PI * radius;
      ring.style.strokeDasharray = circumference;
      ring.style.strokeDashoffset = '0'; // full ring

      // Animate the ring emptying over the whole break, smoothly
      requestAnimationFrame(() => {
        ring.style.transition = `stroke-dashoffset ${total}s linear`;
        ring.style.strokeDashoffset = circumference; // empties to nothing
      });

      const timer = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(timer);
          el.textContent = '0';
          return;
        }
        el.textContent = remaining;
      }, 1000);
    });
  </script>
</body>
</html>
