<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizon Break</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
      cursor: default;
      overflow: hidden;
    }

    .emoji {
      font-size: 72px;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .message {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: 2px;
      margin-bottom: 48px;
    }

    .countdown {
      font-size: 96px;
      font-weight: 200;
      font-variant-numeric: tabular-nums;
      opacity: 0.9;
    }

    .skip {
      margin-top: 48px;
      padding: 10px 28px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      background: transparent;
      color: rgba(255, 255, 255, 0.5);
      font-size: 16px;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    .skip:hover {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
      border-color: rgba(255, 255, 255, 0.5);
    }

    .hint {
      position: absolute;
      bottom: 48px;
      font-size: 16px;
      opacity: 0.4;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="emoji">🌅</div>
  <div class="message">Look at the horizon</div>
  <div class="countdown" id="countdown">20</div>
  <button class="skip" onclick="window.horizon.skipBreak()">Skip</button>
  <div class="hint">Rest your eyes — focus on something far away</div>

  <script>
    window.horizon.getSettings().then(settings => {
      if (settings.soundEnabled) {
        new Audio('../assets/sounds/break-start.wav').play().catch(() => {});
      }

      let remaining = settings.breakSeconds;
      const el = document.getElementById('countdown');
      el.textContent = remaining;

      const timer = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(timer);
          el.textContent = '0';
          return;
        }
        el.textContent = remaining;
      }, 1000);
    });
  </script>
</body>
</html>
