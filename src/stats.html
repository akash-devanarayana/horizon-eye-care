<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horizon · Stats</title>
<link rel="stylesheet" href="fonts.css">
<link rel="stylesheet" href="theme.css">
<style>
  :root {
    --paper: #f4f0e8;
    --paper-2: #ece7db;
    --ink: #0a0a0a;
    --muted: #8a857c;
    --muted-2: #5a554c;
    --gold: #d9c25a;
    --gold-deep: #c4ab3f;
    --line: rgba(10, 10, 10, 0.14);
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
    --sans: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: transparent; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  .card {
    position: relative;
    height: 100%;
    background: var(--paper);
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    animation: rise 0.5s var(--ease) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--gold);
  }

  .topbar {
    -webkit-app-region: drag;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 32px 0;
  }
  .brand { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  .brand .dot { color: var(--gold-deep); }
  .close {
    -webkit-app-region: no-drag;
    width: 26px; height: 26px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink);
    border-radius: 4px;
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
    display: grid;
    place-items: center;
    transition: all 0.15s var(--ease);
  }
  .close:hover { background: var(--ink); color: var(--paper); }

  .head { padding: 16px 32px 18px; }
  .head h1 {
    font-size: 42px;
    font-weight: 700;
    line-height: 0.98;
    letter-spacing: -0.03em;
  }
  .head h1 .accent { color: var(--gold-deep); }
  .head .sub {
    margin-top: 8px;
    font-size: 13px;
    color: var(--muted);
  }

  .body { flex: 1; padding: 0 32px; overflow: hidden; }

  .streak-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 14px 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .streak-now { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
  .streak-best { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 0.04em; }
  .streak-best b { color: var(--gold-deep); }

  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    margin: 18px 0;
  }
  .stat {
    padding: 4px 18px;
    border-left: 1px solid var(--line);
  }
  .stat:first-child { padding-left: 0; border-left: none; }
  .eyebrow {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .stat .num {
    font-size: 48px;
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin: 6px 0 2px;
  }
  .stat .lbl { font-size: 12.5px; color: var(--muted-2); font-weight: 600; }
  .stat .meta { font-size: 11px; color: var(--gold-deep); font-weight: 700; margin-top: 4px; }

  /* chart */
  .figure { padding-top: 6px; }
  .fig-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .fig-title { font-size: 10px; font-weight: 700; letter-spacing: 0.16em; color: var(--muted); text-transform: uppercase; }
  .fig-goal { font-size: 11px; font-weight: 700; color: var(--muted-2); }
  .fig-goal b { color: var(--ink); }

  .chart {
    position: relative;
    height: 132px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
  }
  .goal-line {
    position: absolute;
    left: 0; right: 0;
    border-top: 1px dashed var(--gold-deep);
    z-index: 2;
  }
  .goal-tag {
    position: absolute;
    right: 0;
    transform: translateY(-100%);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--gold-deep);
    background: var(--paper);
    padding: 0 4px;
  }
  .bar {
    position: relative;
    flex: 1;
    max-width: 44px;
    background: var(--ink);
    border-radius: 3px 3px 0 0;
    min-height: 3px;
    transition: height 0.6s var(--ease);
  }
  .bar.today { background: var(--gold); }
  .bar-val {
    position: absolute;
    top: -19px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    font-weight: 700;
    color: var(--muted-2);
  }
  .bar.today .bar-val { color: var(--gold-deep); }
  .days {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-top: 9px;
  }
  .day {
    flex: 1;
    max-width: 44px;
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
  }
  .day.today { color: var(--ink); }
</style>
</head>
<body>
  <div class="card">
    <div class="topbar">
      <div class="brand">Horizon<span class="dot">.</span></div>
      <button class="close" id="closeBtn" aria-label="Close">&times;</button>
    </div>

    <div class="head">
      <h1>Eye care,<br><span class="accent">the numbers.</span></h1>
      <div class="sub">Your rhythm this week.</div>
    </div>

    <div class="body">
      <div class="streak-row">
        <div class="streak-now" id="streakNow">Start your streak today.</div>
        <div class="streak-best" id="streakBest">Personal best · <b>—</b></div>
      </div>

      <div class="cards">
        <div class="stat">
          <div class="eyebrow">Today</div>
          <div class="num" id="todayNum">0</div>
          <div class="lbl">Breaks taken</div>
          <div class="meta" id="targetPct">0% of target</div>
        </div>
        <div class="stat">
          <div class="eyebrow">Today</div>
          <div class="num" id="skippedNum">0</div>
          <div class="lbl">Worked through</div>
        </div>
        <div class="stat">
          <div class="eyebrow">All-time</div>
          <div class="num" id="totalNum">0</div>
          <div class="lbl">Breaks taken</div>
        </div>
      </div>

      <div class="figure">
        <div class="fig-head">
          <span class="fig-title">Fig. 01 — Eye rest, last 7 days</span>
          <span class="fig-goal">Goal · <b id="goalPerDay">14</b> / day</span>
        </div>
        <div class="chart" id="chart"></div>
        <div class="days" id="days"></div>
      </div>
    </div>
  </div>

  <script>
    function streakText(streak) {
      if (streak <= 0) return 'Start your streak today.';
      if (streak === 1) return 'Day one of your streak.';
      return 'Day ' + streak + ' of your streak.';
    }

    function renderChart(last7, goal) {
      const chart = document.getElementById('chart');
      const days = document.getElementById('days');
      const maxVal = Math.max(goal, ...last7.map(d => d.completed), 1);
      // leave headroom above the tallest element for value labels
      const scaleMax = maxVal * 1.2;

      // goal line (same coordinate space as the bars)
      const goalLine = document.createElement('div');
      goalLine.className = 'goal-line';
      goalLine.style.bottom = ((goal / scaleMax) * 100) + '%';
      goalLine.innerHTML = '<span class="goal-tag">GOAL</span>';
      chart.appendChild(goalLine);

      last7.forEach(d => {
        const bar = document.createElement('div');
        bar.className = 'bar' + (d.isToday ? ' today' : '');
        bar.style.height = ((d.completed / scaleMax) * 100) + '%';
        bar.innerHTML = '<span class="bar-val">' + d.completed + '</span>';
        chart.appendChild(bar);

        const day = document.createElement('div');
        day.className = 'day' + (d.isToday ? ' today' : '');
        day.textContent = d.label;
        days.appendChild(day);
      });
    }

    window.horizon.getSettings().then(s => {
      if (s && s.theme) document.documentElement.setAttribute('data-theme', s.theme);
    });

    window.horizon.getStats().then(stats => {
      document.getElementById('streakNow').textContent = streakText(stats.streak);

      const best = stats.longestStreak || 0;
      document.getElementById('streakBest').innerHTML =
        'Personal best · <b>' + (best > 0 ? best + (best === 1 ? ' day' : ' days') : '—') + '</b>';

      document.getElementById('todayNum').textContent = stats.todayCompleted;
      document.getElementById('skippedNum').textContent = stats.todaySkipped;
      document.getElementById('totalNum').textContent = stats.totalCompleted;

      const goal = stats.dailyGoal || 14;
      const pct = goal > 0 ? Math.round((stats.todayCompleted / goal) * 100) : 0;
      document.getElementById('targetPct').textContent = pct + '% of target';
      document.getElementById('goalPerDay').textContent = goal;

      renderChart(stats.last7, goal);
    });

    document.getElementById('closeBtn').addEventListener('click', () => {
      window.horizon.closeStats();
    });
  </script>
</body>
</html>
