<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horizon · Settings</title>
<link rel="stylesheet" href="fonts.css">
<style>
  :root {
    --paper: #f4f0e8;
    --paper-2: #ece7db;
    --ink: #0a0a0a;
    --muted: #8a857c;
    --gold: #d9c25a;
    --gold-deep: #c4ab3f;
    --line: rgba(10, 10, 10, 0.14);
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
    --sans: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; overflow: hidden; background: transparent; }

  body {
    font-family: var(--sans);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  .card {
    position: relative;
    height: 100%;
    background: var(--paper);
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    animation: rise 0.5s var(--ease) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* thin gold rule along the very top */
  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--gold);
  }

  /* ---- top bar ---- */
  .topbar {
    -webkit-app-region: drag;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 30px 0;
  }

  .brand {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .brand .dot { color: var(--gold-deep); }

  .kicker {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .close {
    -webkit-app-region: no-drag;
    width: 26px; height: 26px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink);
    border-radius: 4px;
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
    display: grid;
    place-items: center;
    transition: all 0.15s var(--ease);
  }
  .close:hover { background: var(--ink); color: var(--paper); }

  /* ---- heading ---- */
  .head {
    padding: 18px 30px 22px;
  }
  .head h1 {
    font-size: 46px;
    font-weight: 700;
    line-height: 0.98;
    letter-spacing: -0.03em;
  }
  .head h1 .accent { color: var(--gold-deep); }

  /* ---- body / sections ---- */
  .body {
    flex: 1;
    padding: 0 30px;
    overflow: hidden;
  }

  .section {
    padding: 18px 0;
    border-top: 1px solid var(--line);
  }

  .sec-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 14px;
  }
  .sec-letter {
    font-size: 13px;
    font-weight: 700;
    color: var(--gold-deep);
  }
  .sec-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .sec-desc {
    font-size: 12.5px;
    color: var(--muted);
    margin-left: auto;
    text-align: right;
  }

  .value-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .value {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .value input {
    width: 90px;
    border: none;
    background: transparent;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 52px;
    font-weight: 700;
    letter-spacing: -0.03em;
    outline: none;
    -moz-appearance: textfield;
    border-bottom: 2px solid transparent;
    transition: border-color 0.2s var(--ease);
  }
  .value input:focus { border-bottom-color: var(--gold); }
  .value input::-webkit-outer-spin-button,
  .value input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .value .unit {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--muted);
  }

  .chips { display: flex; gap: 8px; }
  .chip {
    min-width: 42px;
    padding: 9px 12px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink);
    border-radius: 4px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s var(--ease);
  }
  .chip:hover { background: var(--paper-2); }
  .chip.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  /* toggle sections */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .toggle {
    -webkit-app-region: no-drag;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }
  .toggle .state {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: var(--muted);
    width: 30px;
    text-align: right;
  }
  .toggle.on .state { color: var(--gold-deep); }
  .switch {
    position: relative;
    width: 48px; height: 26px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--paper-2);
    transition: all 0.2s var(--ease);
  }
  .switch::after {
    content: "";
    position: absolute;
    top: 2px; left: 2px;
    width: 20px; height: 20px;
    background: var(--muted);
    border-radius: 3px;
    transition: all 0.2s var(--ease);
  }
  .toggle.on .switch { background: var(--gold); border-color: var(--gold-deep); }
  .toggle.on .switch::after { left: 24px; background: var(--ink); }

  /* ---- save bar ---- */
  .save {
    -webkit-app-region: no-drag;
    width: 100%;
    border: none;
    background: var(--ink);
    color: var(--paper);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 20px;
    cursor: pointer;
    transition: all 0.18s var(--ease);
  }
  .save:hover { background: var(--gold-deep); color: var(--ink); }
  .save:active { transform: scale(0.995); }
</style>
</head>
<body>
  <div class="card">
    <div class="topbar">
      <div class="brand">Horizon<span class="dot">.</span></div>
      <div class="kicker">
        <button class="close" id="closeBtn" aria-label="Close">&times;</button>
      </div>
    </div>

    <div class="head">
      <h1>Tune your<br><span class="accent">focus rhythm.</span></h1>
    </div>

    <div class="body">
      <!-- A: Work interval -->
      <div class="section">
        <div class="sec-head">
          <span class="sec-letter">A</span>
          <span class="sec-title">Work interval</span>
          <span class="sec-desc">The length of one focus block.</span>
        </div>
        <div class="value-row">
          <div class="value">
            <input type="number" id="workMinutes" min="1" max="120" value="20">
            <span class="unit">MIN</span>
          </div>
          <div class="chips" id="workChips">
            <button class="chip" data-v="15">15</button>
            <button class="chip" data-v="20">20</button>
            <button class="chip" data-v="25">25</button>
            <button class="chip" data-v="30">30</button>
          </div>
        </div>
      </div>

      <!-- B: Break duration -->
      <div class="section">
        <div class="sec-head">
          <span class="sec-letter">B</span>
          <span class="sec-title">Break duration</span>
          <span class="sec-desc">A pause to rest the eyes.</span>
        </div>
        <div class="value-row">
          <div class="value">
            <input type="number" id="breakSeconds" min="5" max="300" value="20">
            <span class="unit">SEC</span>
          </div>
          <div class="chips" id="breakChips">
            <button class="chip" data-v="15">15</button>
            <button class="chip" data-v="20">20</button>
            <button class="chip" data-v="30">30</button>
            <button class="chip" data-v="45">45</button>
          </div>
        </div>
      </div>

      <!-- C: Sound -->
      <div class="section">
        <div class="toggle-row">
          <div class="sec-head" style="margin-bottom:0;">
            <span class="sec-letter">C</span>
            <span class="sec-title">Sound</span>
            <span class="sec-desc">A chime so you don't miss the moment.</span>
          </div>
          <div class="toggle on" id="soundToggle">
            <span class="state">ON</span>
            <span class="switch"></span>
          </div>
        </div>
      </div>

      <!-- D: Focus shield -->
      <div class="section">
        <div class="toggle-row">
          <div class="sec-head" style="margin-bottom:0;">
            <span class="sec-letter">D</span>
            <span class="sec-title">Focus shield</span>
            <span class="sec-desc">Pause during fullscreen apps.</span>
          </div>
          <div class="toggle on" id="dndToggle">
            <span class="state">ON</span>
            <span class="switch"></span>
          </div>
        </div>
      </div>

      <!-- E: Daily goal -->
      <div class="section">
        <div class="sec-head">
          <span class="sec-letter">E</span>
          <span class="sec-title">Daily goal</span>
          <span class="sec-desc">Breaks to aim for each day.</span>
        </div>
        <div class="value-row">
          <div class="value">
            <input type="number" id="dailyGoal" min="1" max="100" value="14">
            <span class="unit">BREAKS</span>
          </div>
          <div class="chips" id="goalChips">
            <button class="chip" data-v="8">8</button>
            <button class="chip" data-v="12">12</button>
            <button class="chip" data-v="16">16</button>
            <button class="chip" data-v="20">20</button>
          </div>
        </div>
      </div>
    </div>

    <button class="save" id="saveBtn">Save &amp; Resume &rarr;</button>
  </div>

  <script>
    const workInput = document.getElementById('workMinutes');
    const breakInput = document.getElementById('breakSeconds');
    const goalInput = document.getElementById('dailyGoal');
    const soundToggle = document.getElementById('soundToggle');
    const dndToggle = document.getElementById('dndToggle');

    function syncChips(containerId, input) {
      const v = parseInt(input.value, 10);
      document.querySelectorAll('#' + containerId + ' .chip').forEach(chip => {
        chip.classList.toggle('active', parseInt(chip.dataset.v, 10) === v);
      });
    }

    function wireChips(containerId, input) {
      document.querySelectorAll('#' + containerId + ' .chip').forEach(chip => {
        chip.addEventListener('click', () => {
          input.value = chip.dataset.v;
          syncChips(containerId, input);
        });
      });
      input.addEventListener('input', () => syncChips(containerId, input));
    }

    function setToggle(el, on) {
      el.classList.toggle('on', on);
      el.querySelector('.state').textContent = on ? 'ON' : 'OFF';
    }

    soundToggle.addEventListener('click', () => setToggle(soundToggle, !soundToggle.classList.contains('on')));
    dndToggle.addEventListener('click', () => setToggle(dndToggle, !dndToggle.classList.contains('on')));

    wireChips('workChips', workInput);
    wireChips('breakChips', breakInput);
    wireChips('goalChips', goalInput);

    window.horizon.getSettings().then(settings => {
      workInput.value = settings.workMinutes;
      breakInput.value = settings.breakSeconds;
      goalInput.value = settings.dailyGoal || 14;
      setToggle(soundToggle, settings.soundEnabled !== false);
      setToggle(dndToggle, settings.dndEnabled !== false);
      syncChips('workChips', workInput);
      syncChips('breakChips', breakInput);
      syncChips('goalChips', goalInput);
    });

    document.getElementById('saveBtn').addEventListener('click', () => {
      const workMinutes = parseInt(workInput.value, 10) || 20;
      const breakSeconds = parseInt(breakInput.value, 10) || 20;
      const dailyGoal = parseInt(goalInput.value, 10) || 14;
      const soundEnabled = soundToggle.classList.contains('on');
      const dndEnabled = dndToggle.classList.contains('on');
      window.horizon.saveSettings({ workMinutes, breakSeconds, dailyGoal, soundEnabled, dndEnabled });
    });

    document.getElementById('closeBtn').addEventListener('click', () => {
      window.horizon.closeSettings();
    });
  </script>
</body>
</html>
